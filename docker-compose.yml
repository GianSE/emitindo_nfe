# =====================================================================
# ERP desacoplado por eventos — um container por "pedaço".
#
#   postgres        -> banco (fila via outbox + log de eventos)
#   migrate         -> aplica as migrations do Drizzle (cria o schema) e sai
#   worker-*        -> consumidores (emissão, estoque, recebimento, financeiro)
#   backend/front   -> API (Fastify) + UI (React)
#   minio           -> storage S3 do XML/DANFE
#
# Subir tudo:       docker compose up --build
# Criar uma venda:  docker compose run --rm erp python app_erp.py --qtd 2
# =====================================================================
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5433:5432"           # exposto p/ inspecionar com psql/DBeaver
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Cria/atualiza o schema via migrations do Drizzle (fonte da verdade do DDL).
  migrate:
    build: ./backend
    command: npm run db:migrate
    environment:
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: erp
      MINIO_ROOT_PASSWORD: erp12345
    ports:
      - "9010:9000"   # API S3
      - "9011:9001"   # console web
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker-emissao:
    build: { context: ., dockerfile: erp/Dockerfile }
    command: python workers/emissao.py
    environment:
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
      MINIO_ENDPOINT: minio:9000     # o worker fala com o MinIO pela rede interna
      MINIO_ACCESS_KEY: erp
      MINIO_SECRET_KEY: erp12345
      MINIO_BUCKET: nfe-docs
      # "O BOTÃO": descomente p/ delegar a emissão à Focus NFe
      # FISCAL_BACKEND: focus
      # FOCUS_TOKEN: seu_token_aqui
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker-estoque:
    build: { context: ., dockerfile: erp/Dockerfile }
    command: python workers/estoque.py
    environment:
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker-recebimento:
    build: { context: ., dockerfile: erp/Dockerfile }
    command: python workers/recebimento.py
    environment:
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
      DFE_POLL_SEG: "10"             # produção: ~3600 (intervalo mínimo da SEFAZ)
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker-financeiro:
    build: { context: ., dockerfile: erp/Dockerfile }
    command: python workers/financeiro.py
    environment:
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # -------- Core do ERP: API (Node/Fastify) + UI (React/Vite) -------- #
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
      PORT: "3001"
      AUTH_SECRET: "${AUTH_SECRET:-troque-em-producao}"
      # O SSO (Authentik) é configurado DENTRO do ERP (menu Configurações).
      MINIO_ENDPOINT: http://localhost:9010   # backend assina URLs p/ o NAVEGADOR (host)
      MINIO_ACCESS_KEY: erp
      MINIO_SECRET_KEY: erp12345
      MINIO_BUCKET: nfe-docs
    ports:
      - "3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  # "API"/CLI para criar vendas — não fica rodando; use com `docker compose run`.
  erp:
    build: { context: ., dockerfile: erp/Dockerfile }
    command: python app_erp.py
    environment:
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: ["cli"]

volumes:
  pgdata:
  miniodata:
